<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Visualization Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .hide-scrollbar::-webkit-scrollbar {
            display: none;
        }

        .hide-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
    </style>
</head>

<body class="bg-gray-50 font-sans text-gray-900 min-h-screen flex flex-col">


    <header class="bg-white border-b border-gray-200 py-6 px-8 shadow-sm">
        <div class="max-w-7xl mx-auto flex justify-between items-center">
            <div>
                <h1 class="text-3xl font-extrabold text-indigo-600 tracking-tight">Military Expenditure Analytics</h1>
            </div>
            <div class="hidden md:block">
                <span
                    class="bg-indigo-100 text-indigo-700 px-3 py-1 rounded-full text-sm font-medium border border-indigo-200">
                    Active: 14 Visualizations
                </span>
            </div>
        </div>
    </header>


    <main class="flex-grow flex flex-col justify-center py-12">


        <div class="relative group">
            <div class="flex overflow-x-auto space-x-6 pb-8 px-8 hide-scrollbar snap-x snap-mandatory">
                {% for viz in visualizations %}

                <div class="flex-none w-80 md:w-96 snap-start">
                    <div
                        class="bg-white rounded-2xl shadow-md border border-gray-100 overflow-hidden transform transition duration-300 hover:-translate-y-2 hover:shadow-xl">

                        <div class="h-64 bg-gray-100 overflow-hidden border-b border-gray-100">
                            <img src="{{ viz.url }}" alt="{{ viz.title }}" class="w-full h-full object-contain p-4">
                        </div>


                        <div class="p-6">
                            <h3 class="text-lg font-bold text-gray-800 leading-tight">{{ viz.title }}</h3>
                            <p class="text-indigo-500 text-xs font-semibold uppercase tracking-wider mt-1">{{
                                viz.directory.split('/')[1] }}</p>
                            <p class="text-gray-500 text-sm mt-3 leading-relaxed">
                                {{ viz.description }}
                            </p>
                            <div class="mt-6 pt-4 border-t border-gray-50 flex items-center justify-between">
                                <span class="text-gray-400 text-xs">Generated: Today</span>
                                <button class="text-indigo-600 text-xs font-bold hover:underline cursor-pointer">DETAILS
                                    &rarr;</button>
                            </div>
                        </div>
                    </div>
                </div>
                {% endfor %}
            </div>


            <div
                class="absolute inset-y-0 left-0 w-16 bg-gradient-to-r from-gray-50 to-transparent pointer-events-none opacity-0 group-hover:opacity-100 transition-opacity">
            </div>
            <div
                class="absolute inset-y-0 right-0 w-16 bg-gradient-to-l from-gray-50 to-transparent pointer-events-none opacity-0 group-hover:opacity-100 transition-opacity">
            </div>
        </div>
    </main>

    <footer class="bg-white border-t border-gray-200 py-6 px-8 text-center text-gray-400 text-sm">
        &copy; 2026 Military Analytics Project. Built by Sarvesh Hardas, Himanshu Thosar & Sankalp Jain.
    </footer>

</body>

</html>
